name: Build Minecraft Addon

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: "20" # Use a more modern LTS
          cache: 'npm' # Automatically caches node_modules if package-lock exists

      # Install all dependencies at once
      - name: Install Node Dependencies
        run: npm install

      # Actually COMPILE the code into JavaScript for Minecraft to read
      - name: Compile TypeScript to JS
        run: npx tsc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Cache python dependencies too

      - name: Install Python dependencies
        run: pip install pillow rembg

      - name: Convert AI images & process textures
        run: python tools/convert_and_check.py

      # Packaging both Resource and Behavior packs into a single .mcaddon
      # or separate .mcpacks
      - name: Package Addon
        run: |
          mkdir -p build_output
          
          # Zip Resource Pack
          cd resource_pack
          zip -r ../build_output/pistol_rp.mcpack .
          cd ..
          
          # Zip Behavior Pack (including the compiled JS from Step 5)
          cd behavior_pack
          zip -r ../build_output/pistol_bp.mcpack .
          cd ..
          
          # Optional: Create an .mcaddon (contains both)
          cd build_output
          zip -r ../pistol_addon.mcaddon .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pistol-complete-addon
          path: |
            build_output/*.mcpack
            pistol_addon.mcaddon
