name: Build Minecraft Addon

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Node.js (for TypeScript)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 3. Install TypeScript
      - name: Install TypeScript
        run: npm install typescript@latest --save-dev

      # 4. Install Bedrock TS types
      - name: Install Minecraft Bedrock TS types
        run: npm install bc-minecraft-bedrock-types --save-dev

      # 5. Run TypeScript type check
      - name: TypeScript check
        run: npx tsc --noEmit

      # 6. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 7. Install Python dependencies
      - name: Install Python dependencies
        run: pip install pillow rembg

      # 8. Convert AI images → Minecraft textures & validate
      - name: Convert textures & validate add-on
        run: python tools/convert_and_check.py

      # 9. Debug: show generated files
      - name: Show generated files
        run: ls -R resource_pack

      # 10. Package .mcpack
      - name: Package addon
        run: |
          mkdir -p build
          cp -r resource_pack build/
          cd build
          zip -r ../addon.mcpack .

      # 11. Upload the packaged .mcpack
      - name: Upload mcpack
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-addon
          path: addon.mcpack