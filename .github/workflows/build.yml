name: Build Minecraft Addon

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js (for TypeScript)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 3️⃣ Install TypeScript + Bedrock TS types
      - name: Install TypeScript & Bedrock types
        run: |
          npm install typescript@latest --save-dev
          npm install bc-minecraft-bedrock-types --save-dev

      # 4️⃣ Ensure we have a proper tsconfig (create if missing)
      - name: Ensure tsconfig.json
        run: |
          if [ ! -f tsconfig.json ]; then
            echo '{
  "compilerOptions": {
    "target": "ES2020",
    "module": "ESNext",
    "strict": true,
    "esModuleInterop": true,
    "skipLibCheck": true
  },
  "include": [
    "behavior_pack/scripts/**/*.ts",
    "node_modules/bc-minecraft-bedrock-types/index.d.ts"
  ]
}' > tsconfig.json
          fi

      # 5️⃣ Run TypeScript type check (no emit)
      - name: TypeScript check
        run: npx tsc --noEmit

      # 6️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 7️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: pip install pillow rembg

      # 8️⃣ Convert AI images → Minecraft textures & validate
      - name: Convert textures & validate add-on
        run: python tools/convert_and_check.py

      # 9️⃣ Debug: show generated files
      - name: Show generated files
        run: ls -R resource_pack

      # 🔟 Package .mcpack
      - name: Package addon
        run: |
          mkdir -p build
          cp -r resource_pack build/
          cd build
          zip -r ../addon.mcpack .

      # 1️⃣1️⃣ Upload the packaged .mcpack
      - name: Upload mcpack
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-addon
          path: addon.mcpack